<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selected Work</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>

/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#03060e;
  --bg2:#060d1a;
  --teal:#00ddc8;
  --t06:rgba(0,221,200,.06);
  --t12:rgba(0,221,200,.12);
  --t20:rgba(0,221,200,.20);
  --t40:rgba(0,221,200,.40);
  --t70:rgba(0,221,200,.70);
  --text:rgba(224,232,228,.92);
  --mid:rgba(224,232,228,.50);
  --dim:rgba(224,232,228,.18);
  --amber:#f0a04b;
  --disp:'Rajdhani',sans-serif;
  --mono:'Share Tech Mono',monospace;
  --body:'Inter',sans-serif;
  --eout:cubic-bezier(.16,1,.3,1);
}

html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--text);
  font-family:var(--body);
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}

body::after{
  content:'';position:fixed;inset:0;
  pointer-events:none;z-index:9999;opacity:.028;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px 200px;
}

.demo-hero{
  height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;letter-spacing:3px;
  color:var(--dim);text-transform:uppercase;
  border-bottom:1px solid var(--t12);
}

/* ══════════════════════════════════════════
   SECTION
══════════════════════════════════════════ */
#works{
  position:relative;
  padding:120px 0 140px;
  overflow:hidden;
}

/* ── HEADER ── */
.w-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  padding:0 clamp(24px,5vw,80px);
  margin-bottom:52px;
  gap:20px;flex-wrap:wrap;
}

.w-label{display:flex;flex-direction:column;gap:10px}

.w-eyebrow{
  font-family:var(--mono);font-size:10px;
  letter-spacing:4px;color:var(--teal);text-transform:uppercase;
  display:flex;align-items:center;gap:10px;
  opacity:0;transform:translateY(12px);
}
.w-eyebrow::before{
  content:'';display:inline-block;
  width:20px;height:1px;
  background:var(--teal);box-shadow:0 0 6px var(--teal);
}

.w-title{
  font-family:var(--disp);font-weight:700;
  font-size:clamp(42px,6vw,82px);
  line-height:.95;letter-spacing:-1.5px;
  opacity:0;transform:translateY(16px);
}
.w-title span{color:var(--teal)}

/* ── NAV ROW (right side of header) ── */
.w-nav{
  display:flex;align-items:center;gap:20px;
  padding-bottom:6px;
}

/* progress bar */
.w-progress{
  display:flex;align-items:center;gap:10px;
  opacity:0;
}
.prog-nums{
  font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--dim);
  white-space:nowrap;
}
.prog-track{
  width:80px;height:2px;
  background:var(--t12);border-radius:2px;overflow:hidden;
}
.prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--t40),var(--teal));
  border-radius:2px;
  transition:width .5s var(--eout);
  box-shadow:0 0 8px var(--t40);
}

/* arrows */
.w-arrows{
  display:flex;gap:8px;
  opacity:0;
}
.arr-btn{
  width:38px;height:38px;border-radius:9px;
  border:1px solid var(--t12);background:transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:border-color .25s,background .25s,transform .15s;
}
.arr-btn:hover{border-color:var(--teal);background:var(--t06)}
.arr-btn:active{transform:scale(.93)}
.arr-btn:disabled{opacity:.22;cursor:not-allowed;pointer-events:none}
.arr-btn svg{width:14px;height:14px;stroke:var(--mid);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.arr-btn:hover svg{stroke:var(--teal)}

/* ── TRACK WRAPPER ── */
/* left/right fade-out masks */
.track-wrapper{
  position:relative;
  padding:0 clamp(24px,5vw,80px);
}
.track-wrapper::before,
.track-wrapper::after{
  content:'';
  position:absolute;top:0;bottom:0;width:clamp(24px,5vw,80px);
  pointer-events:none;z-index:2;
}
.track-wrapper::before{
  left:0;
  background:linear-gradient(90deg,var(--bg) 0%,transparent 100%);
}
.track-wrapper::after{
  right:0;
  background:linear-gradient(270deg,var(--bg) 0%,transparent 100%);
}

/* ── SCROLL TRACK ── */
.track{
  display:flex;gap:20px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  cursor:grab;
  padding-bottom:4px; /* prevent clipping box-shadow */
}
.track::-webkit-scrollbar{display:none}
.track.grabbing{cursor:grabbing}

/* ── CARD ── */
.proj-card{
  flex:0 0 calc((100% - 40px) / 3);
  min-width:280px;
  scroll-snap-align:start;
  background:rgba(6,13,26,.82);
  border:1px solid var(--t12);
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:border-color .35s,box-shadow .35s;
  will-change:transform;
  transform-style:preserve-3d;
  opacity:0;transform:translateY(32px);
}
.proj-card:hover{
  border-color:rgba(0,221,200,.38);
  box-shadow:0 20px 60px rgba(0,0,0,.55),0 0 0 1px rgba(0,221,200,.07);
}

/* card art */
.card-art{
  height:176px;position:relative;overflow:hidden;
  background:var(--bg2);
}
.card-art svg{width:100%;height:100%}
.card-art::after{
  content:'';
  position:absolute;bottom:0;left:0;right:0;height:64px;
  background:linear-gradient(transparent,rgba(6,13,26,.82));
  pointer-events:none;
}

/* card body */
.card-body{
  padding:20px 22px 18px;
  display:flex;flex-direction:column;gap:8px;
}
.card-num{
  font-family:var(--mono);font-size:9px;
  letter-spacing:3px;color:var(--teal);opacity:.55;
}
.card-title{
  font-family:var(--disp);font-weight:700;
  font-size:clamp(17px,2vw,24px);
  line-height:1.08;letter-spacing:-.2px;
  transition:color .3s;
}
.proj-card:hover .card-title{color:var(--teal)}
.card-desc{
  font-size:13px;line-height:1.62;
  color:var(--mid);font-weight:300;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.card-tags{
  display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;
}
.ctag{
  font-family:var(--mono);font-size:9px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--teal);
  padding:2px 7px;border:1px solid var(--t20);border-radius:3px;background:var(--t06);
}
.card-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:10px;border-top:1px solid var(--t12);margin-top:2px;
}
.card-links{display:flex;gap:10px}
.cl{
  font-family:var(--mono);font-size:9px;letter-spacing:2px;
  color:var(--mid);text-decoration:none;text-transform:uppercase;
  display:flex;align-items:center;gap:5px;transition:color .25s;
}
.cl:hover{color:var(--teal)}
.cl svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cl.live{
  color:var(--teal);background:var(--t06);
  border:1px solid var(--t20);padding:3px 9px;border-radius:4px;
}
.cl.live:hover{background:var(--t12)}
.open-hint{
  font-family:var(--mono);font-size:8px;letter-spacing:2px;
  color:var(--dim);text-transform:uppercase;
  opacity:0;transition:opacity .3s;
  display:flex;align-items:center;gap:4px;
}
.open-hint svg{width:9px;height:9px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.proj-card:hover .open-hint{opacity:1}

/* ── DOT INDICATORS ── */
.dot-row{
  display:flex;justify-content:center;gap:6px;
  margin-top:32px;
  opacity:0;
}
.dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--t12);border:1px solid var(--t20);
  transition:background .35s,box-shadow .35s,transform .35s var(--eout),width .35s var(--eout);
  cursor:pointer;
}
.dot.active{
  width:20px;border-radius:3px;
  background:var(--teal);border-color:var(--teal);
  box-shadow:0 0 8px var(--teal);
}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
#modal-overlay{
  position:fixed;inset:0;z-index:10000;
  background:rgba(3,6,14,.94);
  backdrop-filter:blur(24px);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
  opacity:0;pointer-events:none;
  transition:opacity .3s;
}
#modal-overlay.open{opacity:1;pointer-events:all}

#modal{
  position:relative;
  width:100%;max-width:700px;max-height:88vh;
  background:rgba(6,13,26,.97);
  border:1px solid var(--t20);border-radius:20px;
  overflow-y:auto;overflow-x:hidden;
  transform:translateY(24px) scale(.97);
  transition:transform .4s var(--eout);
  box-shadow:0 48px 96px rgba(0,0,0,.7),0 0 0 1px rgba(0,221,200,.05);
  scrollbar-width:none;
}
#modal::-webkit-scrollbar{display:none}
#modal::before{
  content:'';position:absolute;top:0;left:40px;right:40px;height:1px;
  background:linear-gradient(90deg,transparent,var(--t40),transparent);
}
#modal-overlay.open #modal{transform:translateY(0) scale(1)}

.m-art{height:220px;position:relative;overflow:hidden;border-radius:20px 20px 0 0;background:var(--bg2)}
.m-art svg{width:100%;height:100%}
.m-body{padding:38px 44px 44px}
.m-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.m-num{font-family:var(--mono);font-size:9px;letter-spacing:3px;color:var(--teal);opacity:.65}
.m-badge{
  font-family:var(--mono);font-size:9px;letter-spacing:2px;
  color:var(--bg);background:var(--teal);
  padding:2px 8px;border-radius:4px;text-transform:uppercase;
}
.m-title{
  font-family:var(--disp);font-weight:700;
  font-size:clamp(26px,4vw,48px);
  line-height:1;letter-spacing:-.5px;margin-bottom:18px;
}
.m-desc{
  font-size:15px;line-height:1.78;color:var(--mid);
  font-weight:300;margin-bottom:26px;
}
.m-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px}
.m-tag{
  font-family:var(--mono);font-size:10px;letter-spacing:1.5px;
  text-transform:uppercase;color:var(--teal);
  padding:4px 12px;border:1px solid var(--t20);border-radius:6px;background:var(--t06);
}
.m-links{display:flex;gap:12px;flex-wrap:wrap}
.m-gh{
  font-family:var(--mono);font-size:11px;letter-spacing:2px;
  color:var(--mid);text-decoration:none;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
  border:1px solid var(--t20);border-radius:8px;
  padding:11px 22px;transition:color .25s,border-color .25s,background .25s;
}
.m-gh:hover{color:var(--teal);border-color:var(--teal);background:var(--t06)}
.m-gh svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.m-demo{
  font-family:var(--mono);font-size:11px;letter-spacing:2px;
  color:var(--bg);background:var(--teal);text-decoration:none;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
  border-radius:8px;padding:11px 22px;font-weight:600;
  transition:box-shadow .3s,transform .2s;
}
.m-demo:hover{box-shadow:0 0 28px rgba(0,221,200,.45);transform:translateY(-1px)}
.m-demo svg{width:13px;height:13px;stroke:var(--bg);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.m-close{
  position:absolute;top:18px;right:18px;
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--t20);background:rgba(3,9,22,.85);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:border-color .25s,background .25s;z-index:5;
}
.m-close:hover{border-color:var(--teal);background:var(--t06)}
.m-close svg{width:13px;height:13px;stroke:var(--mid);fill:none;stroke-width:2;stroke-linecap:round}

/* ══════════════════════════════════════════
   MOBILE
══════════════════════════════════════════ */
@media(max-width:768px){
  .proj-card{flex:0 0 78vw;min-width:260px}
  .w-nav{gap:12px}
  .prog-track{width:56px}
  .m-body{padding:24px 22px 32px}
  .m-art{height:170px}
  #works{padding:80px 0 100px}
}
@media(max-width:480px){
  .proj-card{flex:0 0 88vw}
  .w-header{margin-bottom:32px}
}
</style>
</head>
<body>

<div class="demo-hero">↓ scroll to projects</div>

<section id="works">

  <!-- HEADER -->
  <div class="w-header">
    <div class="w-label">
      <div class="w-eyebrow" id="w-eye">Portfolio</div>
      <h2 class="w-title" id="w-ttl">Selected<br><span>Work</span></h2>
    </div>
    <div class="w-nav">
      <div class="w-progress" id="w-prog">
        <span class="prog-nums"><span id="pn-cur">01</span> / <span id="pn-tot">08</span></span>
        <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      </div>
      <div class="w-arrows" id="w-arr">
        <button class="arr-btn" id="btn-prev" disabled>
          <svg viewBox="0 0 14 14"><polyline points="9,2 4,7 9,12"/></svg>
        </button>
        <button class="arr-btn" id="btn-next">
          <svg viewBox="0 0 14 14"><polyline points="5,2 10,7 5,12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- TRACK -->
  <div class="track-wrapper">
    <div class="track" id="track"></div>
  </div>

  <!-- DOTS -->
  <div class="dot-row" id="dot-row"></div>

</section>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <button class="m-close" id="m-close">
      <svg viewBox="0 0 13 13"><line x1="2" y1="2" x2="11" y2="11"/><line x1="11" y1="2" x2="2" y2="11"/></svg>
    </button>
    <div class="m-art" id="m-art"></div>
    <div class="m-body">
      <div class="m-eyebrow">
        <span class="m-num" id="m-num"></span>
        <span class="m-badge" id="m-badge" style="display:none">Live</span>
      </div>
      <div class="m-title" id="m-title"></div>
      <div class="m-desc"  id="m-desc"></div>
      <div class="m-tags"  id="m-tags"></div>
      <div class="m-links" id="m-links"></div>
    </div>
  </div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ══════════════════════════════════════════
   DATA
══════════════════════════════════════════ */
const PROJECTS = [
  {
    title:"Orbit Dashboard",
    desc:"Real-time analytics for satellite telemetry. WebSocket-driven with a canvas visualization engine that handles 50k+ data points per second.",
    longDesc:"Orbit Dashboard processes live telemetry streams from orbital assets and renders them in a performant canvas visualization. The system handles 50k+ data points per second with sub-100ms latency. Features include anomaly detection, historical playback, and configurable alert thresholds.",

  {

    github:"#",demo:"#",hasDemo:true,hue:160,
  },
  {
    title:"NightWatch",
    desc:"Open-source uptime monitoring with a beautiful status page and multi-channel incident alerts.",

  {

    longDesc:"Chroma UI provides 40+ accessible, unstyled React components with built-in ARIA roles and keyboard navigation. Animation primitives are built on the Web Animations API. Ships as tree-shakeable ESM with full TypeScript generics support.",

    github:"#",demo:"#",hasDemo:true,hue:270,

    longDesc:"Cartographer lets teams drop pins, draw regions, and annotate geographic data — even without internet. Built on CRDTs for conflict-free offline merging. The backend syncs changes when connectivity returns. Supports GeoJSON import/export.",

    github:"#",demo:null,hasDemo:false,hue:200,

/* ══════════════════════════════════════════
   ART GENERATOR
══════════════════════════════════════════ */
function makeArt(p, w=460, h=190) {
  const {hue} = p;
  const s = (x,o=0) => { const v=Math.sin(hue*.09+x+o)*1e4; return v-Math.floor(v); };
  const r = (mn,mx,o=0) => mn+s(o)*(mx-mn);
  const c = `hsl(${hue},88%,52%)`;
  const cf = `hsla(${hue},60%,52%,.06)`;
  const id = `a${hue}`;

  let svg = `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="${id}gl"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <radialGradient id="${id}bg" cx="60%" cy="38%" r="65%">
    <stop offset="0%" stop-color="hsl(${hue},50%,7%)"/>
    <stop offset="100%" stop-color="#03060e"/>
  </radialGradient>
</defs>
<rect width="${w}" height="${h}" fill="url(#${id}bg)"/>
<g opacity=".055" stroke="${c}" stroke-width=".5">`;
  for(let x=30;x<w;x+=30) svg+=`<line x1="${x}" y1="0" x2="${x}" y2="${h}"/>`;
  for(let y=30;y<h;y+=30) svg+=`<line x1="0" y1="${y}" x2="${w}" y2="${y}"/>`;
  svg+=`</g>`;

  const v=Math.floor(hue/45)%4;
  if(v===0){
    svg+=`<g filter="url(#${id}gl)">`;
    for(let i=4;i>=1;i--)
      svg+=`<circle cx="${w*.7}" cy="${h*.5}" r="${i*22}" fill="none" stroke="${c}" stroke-width="${1.3-i*.2}" opacity="${.1+i*.1}"/>`;
    svg+=`<circle cx="${w*.7}" cy="${h*.5}" r="7" fill="${c}" opacity=".85"/></g>`;
  } else if(v===1){
    svg+=`<g stroke="${c}" fill="none" stroke-linecap="round">`;
    const paths=[`M${w*.48},${h*.5} h38 v-48 h72`,`M${w*.48},${h*.5} h38 v36 h56`,`M${w*.48+38+72},${h*.5-48} h40`,`M${w*.48+38+56},${h*.5+36} h40 v-18`];
    paths.forEach((d,i)=>{svg+=`<path d="${d}" stroke-width="${1+i*.15}" opacity="${.28+i*.1}"/>`;});
    svg+=`</g>`;
  } else if(v===2){
    let pts='';
    for(let x=16;x<w-16;x+=2){const y=h/2+Math.sin(x/20)*26+Math.sin(x/7)*9;pts+=`${x},${y} `;}
    svg+=`<g filter="url(#${id}gl)"><polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.8" opacity=".55"/></g>`;
  } else {
    const cx=w*.7,cy=h*.5,R=44;
    const hex=(r2)=>Array.from({length:6},(_,i)=>{const a=Math.PI/3*i-Math.PI/6;return `${cx+r2*Math.cos(a)},${cy+r2*Math.sin(a)}`;}).join(' ');
    svg+=`<g filter="url(#${id}gl)">
      <polygon points="${hex(R)}" fill="${cf}" stroke="${c}" stroke-width="1.2" opacity=".5"/>
      <polygon points="${hex(R*.6)}" fill="rgba(0,221,200,.08)" stroke="${c}" stroke-width=".8" opacity=".6"/>
      <circle cx="${cx}" cy="${cy}" r="6" fill="${c}" opacity=".9"/>
    </g>`;
  }

  // scattered dots (left half so they don't overlap main shape)
  svg+=`<g filter="url(#${id}gl)">`;
  for(let i=0;i<6;i++){
    const x=r(18,w*.42,i*5),y=r(12,h-12,i*11),rd=r(1.2,3.2,i*7),op=r(.2,.6,i*3);
    svg+=`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${rd.toFixed(1)}" fill="${c}" opacity="${op.toFixed(2)}"/>`;
  }
  svg+=`</g>`;

  // tag chip
  svg+=`<rect x="${w-104}" y="${h-28}" width="88" height="18" rx="3" fill="rgba(3,9,22,.85)" stroke="${c}" stroke-width=".5" stroke-opacity=".35"/>
<text x="${w-60}" y="${h-16}" text-anchor="middle" font-family="'Share Tech Mono'" font-size="7.5" fill="${c}" opacity=".75" letter-spacing="1.2">${p.tags[0].toUpperCase()}</text>
</svg>`;
  return svg;
}

/* ══════════════════════════════════════════
   BUILD CARDS + DOTS
══════════════════════════════════════════ */
const track   = document.getElementById('track');
const dotRow  = document.getElementById('dot-row');
document.getElementById('pn-tot').textContent = String(PROJECTS.length).padStart(2,'0');

PROJECTS.forEach((p, i) => {
  // card
  const card = document.createElement('div');
  card.className = 'proj-card';
  card.dataset.index = i;
  card.innerHTML = `
    <div class="card-art">${makeArt(p)}</div>
    <div class="card-body">
      <div class="card-num">${String(i+1).padStart(2,'0')}</div>
      <div class="card-title">${p.title}</div>
      <div class="card-desc">${p.desc}</div>
      <div class="card-tags">${p.tags.slice(0,3).map(t=>`<span class="ctag">${t}</span>`).join('')}</div>
      <div class="card-footer">
        <div class="card-links">
          <a href="${p.github}" class="cl" onclick="event.stopPropagation()" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
            Code
          </a>
          ${p.hasDemo?`<a href="${p.demo}" class="cl live" onclick="event.stopPropagation()" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Demo
          </a>`:''}
        </div>
        <div class="open-hint">Details<svg viewBox="0 0 10 10"><polyline points="2,5 8,5"/><polyline points="5,2 8,5 5,8"/></svg></div>
      </div>
    </div>`;
  card.addEventListener('click', ()=>openModal(i));
  track.appendChild(card);

  // dot
  const dot = document.createElement('div');
  dot.className = 'dot' + (i===0?' active':'');
  dot.dataset.index = i;
  dot.addEventListener('click', ()=>scrollToCard(i));
  dotRow.appendChild(dot);
});

/* ══════════════════════════════════════════
   SCROLL STATE
══════════════════════════════════════════ */
let activeIdx = 0;

function getCardWidth() {
  const first = track.querySelector('.proj-card');
  if(!first) return 300;
  return first.offsetWidth + 20; // card + gap
}

function scrollToCard(idx) {
  idx = Math.max(0, Math.min(idx, PROJECTS.length-1));
  const target = idx * getCardWidth();
  track.scrollTo({ left: target, behavior: 'smooth' });
}

function updateState(idx) {
  if(idx === activeIdx && document.querySelector('.dot.active')) return;
  activeIdx = idx;

  // dots
  document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active', i===idx));

  // progress
  const pct = (idx / (PROJECTS.length-1)) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('pn-cur').textContent = String(idx+1).padStart(2,'0');

  // arrows
  document.getElementById('btn-prev').disabled = idx===0;
  document.getElementById('btn-next').disabled = idx===PROJECTS.length-1;
}

/* ══════════════════════════════════════════
   BLUR / FADE TRANSITION
   Each card blurs + dims based on distance
   from the track center. Center = sharp + full
   opacity. Edges = blurred + dimmed.
══════════════════════════════════════════ */
function applyBlurFade() {
  const cards   = track.querySelectorAll('.proj-card');
  const cw      = getCardWidth();
  const center  = track.scrollLeft + track.clientWidth / 2;

  cards.forEach((card, i) => {
    const cardCenter = i * cw + card.offsetWidth / 2;
    const dist = Math.abs(cardCenter - center) / cw;

    const blur    = Math.min(6, dist * 4.8);
    const opacity = Math.max(0.28, 1 - dist * 0.54);
    const scale   = Math.max(0.93, 1 - dist * 0.04);

    // Use GSAP for smooth interpolated transitions
    gsap.to(card, {
      filter:  `blur(${blur.toFixed(2)}px)`,
      opacity: opacity,
      scale:   scale,
      duration: 0.25,
      ease:    'power2.out',
      overwrite: 'auto'
    });
  });
}

/* ══════════════════════════════════════════
   SCROLL LISTENER
══════════════════════════════════════════ */
let scrollTicking = false;
track.addEventListener('scroll', ()=>{
  if(!scrollTicking) {
    requestAnimationFrame(()=>{
      const idx = Math.round(track.scrollLeft / getCardWidth());
      updateState(idx);
      applyBlurFade();
      scrollTicking = false;
    });
    scrollTicking = true;
  }
}, {passive:true});

window.addEventListener('resize', applyBlurFade);

/* ══════════════════════════════════════════
   DRAG TO SCROLL
══════════════════════════════════════════ */
let dragStart = null, dragScrollStart = 0, didDrag = false;

track.addEventListener('mousedown', e=>{
  dragStart = e.clientX;
  dragScrollStart = track.scrollLeft;
  didDrag = false;
  track.classList.add('grabbing');
  e.preventDefault();
});

document.addEventListener('mousemove', e=>{
  if(dragStart===null) return;
  const dx = dragStart - e.clientX;
  if(Math.abs(dx)>4) didDrag=true;
  track.scrollLeft = dragScrollStart + dx;
  applyBlurFade();
});

document.addEventListener('mouseup', e=>{
  if(dragStart===null) return;
  track.classList.remove('grabbing');
  if(didDrag){
    // snap to nearest
    const idx = Math.round(track.scrollLeft / getCardWidth());
    scrollToCard(idx);
  }
  dragStart=null;
});

/* ══════════════════════════════════════════
   ARROW BUTTONS
══════════════════════════════════════════ */
document.getElementById('btn-prev').addEventListener('click',()=>scrollToCard(activeIdx-1));
document.getElementById('btn-next').addEventListener('click',()=>scrollToCard(activeIdx+1));

/* keyboard */
document.addEventListener('keydown', e=>{
  if(document.getElementById('modal-overlay').classList.contains('open')) return;
  if(e.key==='ArrowRight') scrollToCard(activeIdx+1);
  if(e.key==='ArrowLeft')  scrollToCard(activeIdx-1);
});

/* ══════════════════════════════════════════
   3D TILT
══════════════════════════════════════════ */
function setupTilt(){
  document.querySelectorAll('.proj-card').forEach(card=>{
    card.addEventListener('mousemove',e=>{
      if(dragStart!==null) return;
      const r=card.getBoundingClientRect();
      const x=(e.clientX-r.left)/r.width-.5;
      const y=(e.clientY-r.top)/r.height-.5;
      gsap.to(card,{rotateX:-y*5,rotateY:x*5,transformPerspective:900,duration:.5,ease:'power2.out'});
    });
    card.addEventListener('mouseleave',()=>{
      gsap.to(card,{rotateX:0,rotateY:0,duration:.7,ease:'power2.out'});
    });
  });
}

/* ══════════════════════════════════════════
   MODAL
══════════════════════════════════════════ */
function openModal(idx){
  const p=PROJECTS[idx];
  document.getElementById('m-num').textContent   = `PROJECT ${String(idx+1).padStart(2,'0')}`;
  document.getElementById('m-title').textContent = p.title;
  document.getElementById('m-desc').textContent  = p.longDesc;
  document.getElementById('m-art').innerHTML     = makeArt(p, 700, 220);
  const badge=document.getElementById('m-badge');
  badge.style.display = p.hasDemo?'inline-block':'none';
  document.getElementById('m-tags').innerHTML =
    p.tags.map(t=>`<span class="m-tag">${t}</span>`).join('');
  document.getElementById('m-links').innerHTML=`
    <a href="${p.github}" class="m-gh" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
      View on GitHub
    </a>
    ${p.hasDemo?`<a href="${p.demo}" class="m-demo" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Live Demo
    </a>`:`<span style="font-family:var(--mono);font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;align-self:center">No live demo</span>`}`;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.getElementById('m-close').addEventListener('click',closeModal);
document.getElementById('modal-overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal-overlay')) closeModal();
});
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ══════════════════════════════════════════
   SCROLL ENTRANCE
══════════════════════════════════════════ */
ScrollTrigger.create({
  trigger:'#works', start:'top 75%',
  onEnter(){
    gsap.to('#w-eye',   {opacity:1,y:0,duration:.8,ease:'power3.out'});
    gsap.to('#w-ttl',   {opacity:1,y:0,duration:.9,ease:'power3.out',delay:.1});
    gsap.to('#w-prog',  {opacity:1,duration:.7,ease:'power2.out',delay:.22});
    gsap.to('#w-arr',   {opacity:1,duration:.7,ease:'power2.out',delay:.28});
    gsap.to('#dot-row', {opacity:1,duration:.6,ease:'power2.out',delay:.35});

    // stagger cards in
    gsap.to('.proj-card',{
      opacity:1, y:0, duration:.65,
      stagger:{each:.1,from:'start'},
      ease:'power3.out', delay:.2,
      onComplete: setupTilt
    });
  }
});

/* init */
updateState(0);
// slight delay so cards are painted before first blur calc
requestAnimationFrame(()=>{ requestAnimationFrame(applyBlurFade); });
</script>
</body>
