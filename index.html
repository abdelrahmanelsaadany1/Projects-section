<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selected Work</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
/* ═══════════════════════════════════════
   RESET & TOKENS
═══════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:      #03060e;
  --bg2:     #07101f;
  --surface: rgba(7,16,31,.72);
  --teal:    #00ddc8;
  --teal2:   #00b8a6;
  --t04:     rgba(0,221,200,.04);
  --t08:     rgba(0,221,200,.08);
  --t16:     rgba(0,221,200,.16);
  --t32:     rgba(0,221,200,.32);
  --t60:     rgba(0,221,200,.60);
  --white:   #e8f0ed;
  --mid:     rgba(232,240,237,.48);
  --dim:     rgba(232,240,237,.18);
  --faint:   rgba(232,240,237,.07);
  --disp:    'Syne', sans-serif;
  --mono:    'DM Mono', monospace;
  --serif:   'Fraunces', serif;
  --ease:    cubic-bezier(.19,1,.22,1);
  --ease2:   cubic-bezier(.76,0,.24,1);
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--disp);
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Grain overlay ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  pointer-events: none; z-index: 9998;
  opacity: .032;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  background-size: 256px;
}

@media(hover:none){ }

/* ── Demo hero ── */
.demo-hero {
  height: 100vh; display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 10px; letter-spacing: 4px;
  color: var(--dim); text-transform: uppercase;
  border-bottom: 1px solid var(--t08);
}

/* ═══════════════════════════════════════
   SECTION SHELL
═══════════════════════════════════════ */
#works {
  position: relative;
  padding: 130px 0 160px;
  overflow: hidden;
}

/* ── ambient glow behind section ── */
#works::before {
  content: '';
  position: absolute; top: -200px; left: 50%; transform: translateX(-50%);
  width: 900px; height: 600px;
  background: radial-gradient(ellipse, rgba(0,221,200,.04) 0%, transparent 70%);
  pointer-events: none;
}

/* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
.w-header {
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 0 clamp(28px,6vw,96px);
  margin-bottom: 64px;
  gap: 24px; flex-wrap: wrap;
}

.w-label { display: flex; flex-direction: column; gap: 14px; }

.w-eyebrow {
  font-family: var(--mono); font-size: 9px; letter-spacing: 5px;
  color: var(--teal); text-transform: uppercase;
  display: flex; align-items: center; gap: 12px;
  clip-path: inset(0 100% 0 0);
}
.w-eyebrow::before {
  content: ''; display: inline-block; width: 24px; height: 1px;
  background: var(--teal); box-shadow: 0 0 8px var(--teal);
}

.w-title {
  font-family: var(--disp); font-weight: 800;
  font-size: clamp(52px,7vw,104px);
  line-height: .92; letter-spacing: -3px;
  clip-path: inset(0 0 100% 0);
}
.w-title em {
  font-family: var(--serif); font-weight: 300;
  font-style: italic; color: var(--teal);
  letter-spacing: -1px;
}

/* ── right nav ── */
.w-nav {
  display: flex; align-items: center; gap: 16px;
  padding-bottom: 8px;
  opacity: 0;
}

.prog-wrap {
  display: flex; align-items: center; gap: 10px;
}
.prog-nums {
  font-family: var(--mono); font-size: 9px; letter-spacing: 3px; color: var(--dim);
}
.prog-track {
  width: 72px; height: 1px;
  background: var(--t16); border-radius: 1px; overflow: hidden;
}
.prog-fill {
  height: 100%; width: 0%;
  background: var(--teal);
  box-shadow: 0 0 12px var(--teal);
  transition: width .6s var(--ease);
}

.arr-wrap { display: flex; gap: 10px; align-items: center; }

.arr {
  position: relative;
  width: 88px; height: 36px;
  border-radius: 100px;
  border: 1px solid var(--t16);
  background: transparent;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  cursor: pointer;
  overflow: hidden;
  transition: border-color .35s, color .35s;
  color: var(--mid);
}

/* fill sweep on hover */
.arr::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--teal);
  transform: scaleX(0);
  transform-origin: left center;
  transition: transform .45s cubic-bezier(.76,0,.24,1);
  border-radius: 100px;
}
.arr:hover::before { transform: scaleX(1); }
.arr:hover { border-color: var(--teal); color: var(--bg); }
.arr:active { transform: scale(.95); }
.arr:disabled { opacity: .2; pointer-events: none; }

.arr-label {
  position: relative; z-index: 1;
  font-family: var(--mono); font-size: 8px;
  letter-spacing: 2px; text-transform: uppercase;
  transition: color .35s;
}
.arr svg {
  position: relative; z-index: 1;
  width: 11px; height: 11px;
  stroke: currentColor; fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  transition: transform .3s var(--ease);
}
.arr:hover svg { transform: translateX(3px); }
#btn-prev:hover svg { transform: translateX(-3px); }
#btn-prev::before { transform-origin: right center; }
#btn-prev:hover::before { transform: scaleX(1); }

/* ═══════════════════════════════════════
   TRACK
═══════════════════════════════════════ */
.track-shell {
  position: relative;
  padding: 0 clamp(28px,6vw,96px);
}
.track-shell::before, .track-shell::after {
  content: ''; position: absolute; top: 0; bottom: 0;
  width: clamp(28px,6vw,96px); pointer-events: none; z-index: 4;
}
.track-shell::before { left: 0; background: linear-gradient(90deg, var(--bg), transparent); }
.track-shell::after  { right:0; background: linear-gradient(270deg, var(--bg), transparent); }

.track {
  display: flex;
  overflow: hidden;
  padding-bottom: 2px;
  touch-action: pan-y;
}
.track-inner {
  display: flex;
  gap: 18px;
  will-change: transform;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════
   CARD
═══════════════════════════════════════ */
.proj-card {
  flex: 0 0 clamp(300px, 30vw, 420px);
  border-radius: 20px;
  border: 1px solid var(--t08);
  background: var(--surface);
  backdrop-filter: blur(20px);
  overflow: hidden;
  cursor: pointer;
  opacity: 0; transform: translateY(40px);
  will-change: transform, opacity;
  transition: border-color .4s, box-shadow .4s;
  position: relative;
}
.proj-card:hover {
  border-color: var(--t32);
  box-shadow: 0 32px 80px rgba(0,0,0,.5), 0 0 0 1px var(--t08);
}

/* ── art zone ── */
.card-art {
  height: 200px; position: relative; overflow: hidden;
  background: var(--bg2);
}
.card-art svg { width: 100%; height: 100%; }
.card-art img {
  width: 100%; height: 100%; object-fit: cover; display: block;
  transition: transform .7s var(--ease);
}
.proj-card:hover .card-art img { transform: scale(1.06); }

/* Art gradient overlay */
.card-art::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px;
  background: linear-gradient(transparent, var(--bg2));
  pointer-events: none;
}

/* index badge */
.card-idx {
  position: absolute; top: 14px; left: 14px; z-index: 3;
  font-family: var(--mono); font-size: 8px; letter-spacing: 3px;
  color: var(--teal); background: rgba(3,6,14,.75);
  backdrop-filter: blur(8px);
  padding: 4px 9px; border-radius: 4px;
  border: 1px solid var(--t16);
}

/* live pill */
.card-live {
  position: absolute; top: 14px; right: 14px; z-index: 3;
  font-family: var(--mono); font-size: 8px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--bg); background: var(--teal);
  padding: 4px 9px; border-radius: 4px;
  display: flex; align-items: center; gap: 5px;
}
.card-live::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: var(--bg);
  animation: pulse-dot 1.6s ease infinite;
}
@keyframes pulse-dot {
  0%,100%{ opacity:1; transform:scale(1); }
  50%{ opacity:.5; transform:scale(.7); }
}

/* ── card body ── */
.card-body {
  padding: 22px 24px 20px;
  display: flex; flex-direction: column; gap: 10px;
}

.card-title {
  font-family: var(--disp); font-weight: 700;
  font-size: clamp(18px,2.2vw,26px);
  letter-spacing: -.5px; line-height: 1.05;
  transition: color .3s;
}
.proj-card:hover .card-title { color: var(--teal); }

.card-desc {
  font-size: 12.5px; line-height: 1.7;
  color: var(--mid); font-family: var(--mono); font-weight: 300;
  display: -webkit-box; -webkit-line-clamp: 3; line-clamp: 3;
  -webkit-box-orient: vertical; overflow: hidden;
}

.card-tags {
  display: flex; flex-wrap: wrap; gap: 5px; margin-top: 2px;
}
.tag-pill {
  font-family: var(--mono); font-size: 8px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--teal);
  padding: 3px 8px; border: 1px solid var(--t16);
  border-radius: 100px; background: var(--t04);
}

/* ── card footer ── */
.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  padding-top: 12px; margin-top: 4px;
  border-top: 1px solid var(--t08);
}
.card-links { display: flex; gap: 8px; flex-wrap: wrap; }
.clink {
  font-family: var(--mono); font-size: 8px; letter-spacing: 2px;
  color: var(--mid); text-decoration: none; text-transform: uppercase;
  display: flex; align-items: center; gap: 4px;
  transition: color .25s;
}
.clink:hover { color: var(--teal); }
.clink svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.clink.live-btn {
  color: var(--teal); border: 1px solid var(--t16);
  background: var(--t04); padding: 3px 10px; border-radius: 100px;
}
.clink.live-btn:hover { background: var(--t08); }
.card-view {
  font-family: var(--mono); font-size: 8px; letter-spacing: 2px;
  color: var(--dim); text-transform: uppercase;
  opacity: 0; transform: translateX(-6px);
  transition: opacity .3s, transform .3s, color .3s;
  display: flex; align-items: center; gap: 4px; flex-shrink: 0;
  cursor: pointer;
}
.card-view svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.proj-card:hover .card-view { opacity: 1; transform: translateX(0); }

/* ═══════════════════════════════════════
   DOT ROW — premium numbered indicators
═══════════════════════════════════════ */
.dot-row {
  display: flex; justify-content: center; align-items: center; gap: 6px;
  margin-top: 40px; opacity: 0;
}

.dot {
  position: relative;
  height: 2px;
  width: var(--dot-w, 18px);
  border-radius: 2px;
  background: var(--t16);
  cursor: pointer;
  transition: width .5s var(--ease), background .4s, box-shadow .4s;
  overflow: hidden;
  flex-shrink: 0;
}

.dot::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--teal);
  border-radius: 2px;
  transform: scaleX(0);
  transform-origin: left;
  transition: transform .5s var(--ease);
}

.dot.active {
  width: var(--dot-active, 40px);
  background: var(--t16);
  box-shadow: 0 0 10px var(--t32);
}
.dot.active::before { transform: scaleX(1); }
.dot:hover:not(.active) { background: var(--t32); }

/* ═══════════════════════════════════════
   MODAL
═══════════════════════════════════════ */
#modal-overlay {
  position: fixed; inset: 0; z-index: 10000;
  background: rgba(3,6,14,.92);
  backdrop-filter: blur(32px) saturate(1.2);
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity .4s;
}
#modal-overlay.open { opacity: 1; pointer-events: all; }

#modal {
  position: relative;
  width: 100%; max-width: 720px; max-height: 90vh;
  background: var(--bg2);
  border: 1px solid var(--t16);
  border-radius: 24px;
  overflow-y: auto; overflow-x: hidden;
  transform: translateY(32px) scale(.96);
  transition: transform .5s var(--ease);
  scrollbar-width: none;
  box-shadow: 0 60px 120px rgba(0,0,0,.8), 0 0 0 1px var(--t08);
}
#modal::-webkit-scrollbar { display: none; }
#modal-overlay.open #modal { transform: translateY(0) scale(1); }

/* top line */
#modal::before {
  content: ''; position: absolute;
  top: 0; left: 60px; right: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--t60), transparent);
}

.m-art {
  height: 260px; overflow: hidden;
  border-radius: 24px 24px 0 0;
  background: var(--bg);
  position: relative;
}
.m-art svg { width: 100%; height: 100%; }
.m-art img { width: 100%; height: 100%; object-fit: cover; display: block; }

.m-body { padding: 40px 48px 48px; }

.m-meta {
  display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
}
.m-num {
  font-family: var(--mono); font-size: 9px; letter-spacing: 3px;
  color: var(--teal); opacity: .6;
}
.m-badge {
  font-family: var(--mono); font-size: 8px; letter-spacing: 2px;
  color: var(--bg); background: var(--teal);
  padding: 3px 9px; border-radius: 100px; text-transform: uppercase;
  display: none;
}

.m-title {
  font-family: var(--disp); font-weight: 800;
  font-size: clamp(30px,5vw,56px);
  letter-spacing: -2px; line-height: .95;
  margin-bottom: 20px;
}

.m-desc {
  font-family: var(--mono); font-size: 13.5px;
  line-height: 1.82; color: var(--mid); font-weight: 300;
  margin-bottom: 28px;
}

.m-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 36px; }
.m-tag {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--teal);
  padding: 5px 14px; border: 1px solid var(--t16);
  border-radius: 100px; background: var(--t04);
}

.m-links { display: flex; gap: 12px; flex-wrap: wrap; }
.m-gh {
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
  color: var(--mid); text-decoration: none; text-transform: uppercase;
  display: flex; align-items: center; gap: 8px;
  border: 1px solid var(--t16); border-radius: 100px;
  padding: 11px 24px;
  transition: color .25s, border-color .25s, background .25s;
}
.m-gh:hover { color: var(--teal); border-color: var(--teal); background: var(--t08); }
.m-gh svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

.m-demo {
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
  color: var(--bg); background: var(--teal); text-decoration: none;
  text-transform: uppercase; display: flex; align-items: center; gap: 8px;
  border-radius: 100px; padding: 11px 24px; font-weight: 500;
  transition: box-shadow .3s, transform .25s;
}
.m-demo:hover { box-shadow: 0 0 40px rgba(0,221,200,.4); transform: translateY(-2px); }
.m-demo svg { width: 12px; height: 12px; stroke: var(--bg); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.m-close {
  position: absolute; top: 16px; right: 16px;
  width: 38px; height: 38px; border-radius: 50%;
  border: 1px solid var(--t16); background: rgba(3,6,14,.8);
  backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; z-index: 5;
  transition: border-color .25s, background .25s, transform .2s;
}
.m-close:hover { border-color: var(--teal); background: var(--t08); transform: rotate(90deg); }
.m-close svg { width: 12px; height: 12px; stroke: var(--mid); fill: none; stroke-width: 2; stroke-linecap: round; }

/* ═══════════════════════════════════════
   MOBILE
═══════════════════════════════════════ */
@media(max-width:768px){
  .proj-card { flex: 0 0 82vw; }
  .w-nav { gap: 10px; }
  .prog-track { width: 48px; }
  .m-body { padding: 24px 24px 36px; }
  .m-art { height: 200px; }
  #works { padding: 80px 0 100px; }
  .arr { width: 36px; height: 36px; }
}
@media(max-width:480px){
  .proj-card { flex: 0 0 90vw; }
  .w-header { margin-bottom: 36px; }
  .m-title { letter-spacing: -1px; }
}
</style>
</head>
<body>

<div class="demo-hero">↓ scroll to projects</div>

<section id="works">

  <div class="w-header">
    <div class="w-label">
      <div class="w-eyebrow" id="w-eye">Selected Work</div>
      <h2 class="w-title" id="w-ttl">What I've<br><em>Built</em></h2>
    </div>
    <div class="w-nav" id="w-nav">
      <div class="prog-wrap">
        <span class="prog-nums"><span id="pn-cur">01</span> / <span id="pn-tot">08</span></span>
        <div class="prog-track"><div class="prog-fill" id="prog-fill"></div></div>
      </div>
      <div class="arr-wrap">
        <button class="arr" id="btn-prev" disabled>
          <svg viewBox="0 0 14 14"><polyline points="9,2 4,7 9,12"/></svg>
          <span class="arr-label">Prev</span>
        </button>
        <button class="arr" id="btn-next">
          <span class="arr-label">Next</span>
          <svg viewBox="0 0 14 14"><polyline points="5,2 10,7 5,12"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="track-shell">
    <div class="track" id="track"><div class="track-inner" id="track-inner"></div></div>
  </div>

  <div class="dot-row" id="dot-row"></div>

</section>

<!-- MODAL -->
<div id="modal-overlay">
  <div id="modal">
    <button class="m-close" id="m-close">
      <svg viewBox="0 0 12 12"><line x1="1" y1="1" x2="11" y2="11"/><line x1="11" y1="1" x2="1" y2="11"/></svg>
    </button>
    <div class="m-art" id="m-art"></div>
    <div class="m-body">
      <div class="m-meta">
        <span class="m-num" id="m-num"></span>
        <span class="m-badge" id="m-badge">Live</span>
      </div>
      <div class="m-title" id="m-title"></div>
      <div class="m-desc"  id="m-desc"></div>
      <div class="m-tags"  id="m-tags"></div>
      <div class="m-links" id="m-links"></div>
    </div>
  </div>
</div>

<script>
gsap.registerPlugin(ScrollTrigger);

/* ═══════════════════════════════════
   SVG ILLUSTRATIONS — domain-matched
═══════════════════════════════════ */
const SVG_ART = {

  // 1. Akelny — food ordering: plate + fork/knife + rings
  akelny: (w,h,hue=28) => `
  <svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="ag1" cx="55%" cy="45%" r="60%">
        <stop offset="0%" stop-color="hsl(${hue},60%,9%)"/>
        <stop offset="100%" stop-color="#03060e"/>
      </radialGradient>
      <filter id="ag2"><feGaussianBlur stdDeviation="4"/></filter>
    </defs>
    <rect width="${w}" height="${h}" fill="url(#ag1)"/>
    <!-- glow blob -->
    <circle cx="${w*.58}" cy="${h*.45}" r="70" fill="hsl(${hue},80%,45%)" opacity=".06" filter="url(#ag2)"/>
    <!-- plate -->
    <circle cx="${w*.58}" cy="${h*.46}" r="52" fill="none" stroke="hsl(${hue},75%,55%)" stroke-width="1.2" opacity=".35"/>
    <circle cx="${w*.58}" cy="${h*.46}" r="40" fill="none" stroke="hsl(${hue},75%,55%)" stroke-width=".6" opacity=".2"/>
    <circle cx="${w*.58}" cy="${h*.46}" r="20" fill="hsl(${hue},70%,48%)" opacity=".12"/>
    <!-- fork -->
    <g stroke="hsl(${hue},75%,60%)" stroke-width="1.4" stroke-linecap="round" opacity=".7">
      <line x1="${w*.36}" y1="${h*.18}" x2="${w*.36}" y2="${h*.74}"/>
      <line x1="${w*.33}" y1="${h*.18}" x2="${w*.33}" y2="${h*.38}"/>
      <line x1="${w*.36}" y1="${h*.18}" x2="${w*.36}" y2="${h*.38}"/>
      <line x1="${w*.39}" y1="${h*.18}" x2="${w*.39}" y2="${h*.38}"/>
      <path d="M${w*.33},${h*.38} Q${w*.36},${h*.46} ${w*.39},${h*.38}" fill="none"/>
    </g>
    <!-- knife -->
    <g stroke="hsl(${hue},75%,60%)" stroke-width="1.4" stroke-linecap="round" opacity=".7">

/* ═══════════════════════════════════
   RENDER ART
═══════════════════════════════════ */

  if (p.image) return `<img src="${p.image}" alt="${p.title}" loading="lazy">`;
  const fn = SVG_ART[p.id];
  return fn ? fn(w, h, p.hue) : `<svg viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg"><rect width="${w}" height="${h}" fill="#07101f"/></svg>`;
}

/* ═══════════════════════════════════
   GSAP CAROUSEL ENGINE
═══════════════════════════════════ */
let activeIdx = 0;
let isAnimating = false;

function cardWidth() {
  const c = trackInner.querySelector('.proj-card');
  if (!c) return 340;
  return c.offsetWidth + 18; // card + gap
}

function getOffset(idx) {
  // Center the active card within track viewport
  const cw   = cardWidth();
  const tw   = track.offsetWidth;
  const cardW = trackInner.querySelector('.proj-card')?.offsetWidth || 340;
  return -(idx * cw) + (tw / 2) - (cardW / 2);
}

function goTo(idx, dir) {
  if (isAnimating) return;
  idx = Math.max(0, Math.min(idx, PROJECTS.length - 1));
  if (idx === activeIdx && trackInner.style.transform) return;

  const prev = activeIdx;
  activeIdx  = idx;
  isAnimating = true;

  // Determine slide direction
  const direction = dir !== undefined ? dir : (idx > prev ? 1 : -1);

  // Animate the track
  gsap.to(trackInner, {
    x: getOffset(idx),
    duration: .75,
    ease: 'expo.out',
    onComplete: () => { isAnimating = false; }
  });

  // Cards depth effect
  const cards = trackInner.querySelectorAll('.proj-card');
  cards.forEach((card, i) => {
    const dist = Math.abs(i - idx);
    const isActive = i === idx;
    const isLeaving = i === prev;

    gsap.to(card, {
      scale:   isActive ? 1 : Math.max(0.93, 1 - dist * 0.025),
      opacity: isActive ? 1 : Math.max(0.38, 1 - dist * 0.25),
      filter:  isActive ? 'blur(0px)' : `blur(${Math.min(2, dist * .8)}px)`,
      duration: .65,
      ease: 'expo.out',
      overwrite: 'auto'
    });

    // Entrance animation for the incoming active card
    if (isActive) {
      gsap.fromTo(card,
        { y: 18, rotateY: direction * -6 },
        { y: 0,  rotateY: 0, duration: .75, ease: 'expo.out', overwrite: false }
      );
    }
  });

  // Update UI
  document.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('active', i===idx));
  const pct = (idx / (PROJECTS.length - 1)) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('pn-cur').textContent = String(idx+1).padStart(2,'0');
  document.getElementById('btn-prev').disabled = idx === 0;
  document.getElementById('btn-next').disabled = idx === PROJECTS.length - 1;
}

// Set initial position immediately (no animation)
function initCarousel() {
  gsap.set(trackInner, { x: getOffset(0) });
  const cards = trackInner.querySelectorAll('.proj-card');
  cards.forEach((card, i) => {
    const dist = Math.abs(i);
    gsap.set(card, {
      scale:  i === 0 ? 1 : Math.max(0.93, 1 - dist * 0.025),
      filter: i === 0 ? 'blur(0px)' : `blur(${Math.min(2, dist * .8)}px)`,
    });
  });
  document.getElementById('btn-prev').disabled = true;
  document.getElementById('btn-next').disabled = false;
}

window.addEventListener('resize', () => {
  gsap.set(trackInner, { x: getOffset(activeIdx) });
});

/* ═══════════════════════════════════
   DRAG — mouse + touch (NO page scroll hijack)
═══════════════════════════════════ */
let dragStartX   = null;
let dragStartY   = null;
let dragBaseX    = 0;
let dragged      = false;
let isHorizDrag  = null; // null = undecided, true = horizontal, false = vertical

track.addEventListener('mousedown', e => {
  dragStartX  = e.clientX;
  dragStartY  = e.clientY;
  dragBaseX   = getOffset(activeIdx);
  dragged     = false;
  isHorizDrag = null;
  e.preventDefault();
});

document.addEventListener('mousemove', e => {
  if (dragStartX === null) return;
  const dx = e.clientX - dragStartX;
  const dy = e.clientY - dragStartY;

  if (isHorizDrag === null) {
    if (Math.abs(dx) > 6 || Math.abs(dy) > 6) {
      isHorizDrag = Math.abs(dx) > Math.abs(dy);
    }
    return;
  }
  if (!isHorizDrag) return; // vertical → let page scroll

  if (Math.abs(dx) > 6) dragged = true;
  gsap.set(trackInner, { x: dragBaseX + dx * 0.6 });
});

document.addEventListener('mouseup', e => {
  if (dragStartX === null) return;
  const dx = e.clientX - dragStartX;
  if (dragged && isHorizDrag) {
    const threshold = 60;
    if      (dx < -threshold) goTo(activeIdx + 1,  1);
    else if (dx >  threshold) goTo(activeIdx - 1, -1);
    else                       goTo(activeIdx);
  }
  dragStartX  = null;
  dragStartY  = null;
  isHorizDrag = null;
});

// Touch support
track.addEventListener('touchstart', e => {
  dragStartX  = e.touches[0].clientX;
  dragStartY  = e.touches[0].clientY;
  dragBaseX   = getOffset(activeIdx);
  dragged     = false;
  isHorizDrag = null;
}, { passive: true });

track.addEventListener('touchmove', e => {
  if (dragStartX === null) return;
  const dx = e.touches[0].clientX - dragStartX;
  const dy = e.touches[0].clientY - dragStartY;

  if (isHorizDrag === null) {
    if (Math.abs(dx) > 8 || Math.abs(dy) > 8) {
      isHorizDrag = Math.abs(dx) > Math.abs(dy);
    }
    return;
  }
  if (!isHorizDrag) return; // vertical scroll — don't touch it

  e.preventDefault(); // only block scroll for horizontal drags
  if (Math.abs(dx) > 8) dragged = true;
  gsap.set(trackInner, { x: dragBaseX + dx * 0.6 });
}, { passive: false });

track.addEventListener('touchend', e => {
  if (dragStartX === null) return;
  const dx = e.changedTouches[0].clientX - dragStartX;
  if (dragged && isHorizDrag) {
    const threshold = 50;
    if      (dx < -threshold) goTo(activeIdx + 1,  1);
    else if (dx >  threshold) goTo(activeIdx - 1, -1);
    else                       goTo(activeIdx);
  }
  dragStartX  = null;
  dragStartY  = null;
  isHorizDrag = null;
}, { passive: true });

/* ═══════════════════════════════════
   ARROWS + KEYBOARD
═══════════════════════════════════ */
document.getElementById('btn-prev').addEventListener('click', () => goTo(activeIdx - 1, -1));
document.getElementById('btn-next').addEventListener('click', () => goTo(activeIdx + 1,  1));

document.addEventListener('keydown', e => {
  if (document.getElementById('modal-overlay').classList.contains('open')) {
    if (e.key === 'Escape') closeModal();
    return;
  }
  if (e.key === 'ArrowRight') goTo(activeIdx + 1,  1);
  if (e.key === 'ArrowLeft')  goTo(activeIdx - 1, -1);
});

/* ═══════════════════════════════════
   MODAL
═══════════════════════════════════ */
function openModal(idx) {
  const p = PROJECTS[idx];
  document.getElementById('m-num').textContent   = `PROJECT ${String(idx+1).padStart(2,'0')}`;
  document.getElementById('m-title').textContent = p.title;
  document.getElementById('m-desc').textContent  = p.longDesc;

  const badge = document.getElementById('m-badge');
  badge.style.display = p.hasDemo ? 'inline-block' : 'none';

  document.getElementById('m-art').innerHTML = p.image
    ? `<img src="${p.image}" alt="${p.title}">`
    : (() => { const fn = SVG_ART[p.id]; return fn ? fn(720, 260, p.hue) : ''; })();

  document.getElementById('m-tags').innerHTML =
    p.tags.map(t => `<span class="m-tag">${t}</span>`).join('');

  const ghHTML = p.githubLinks.map(g =>
    `<a href="${g.url}" class="m-gh" target="_blank" rel="noopener">${GH_ICON}${g.label} Repo</a>`
  ).join('');
  const demoHTML = p.hasDemo
    ? `<a href="${p.demo}" class="m-demo" target="_blank" rel="noopener">${EXT_ICON}Live Demo</a>`
    : `<span style="font-family:var(--mono);font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;align-self:center">No live demo</span>`;

  document.getElementById('m-links').innerHTML = ghHTML + demoHTML;

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('m-close').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

/* ═══════════════════════════════════
   SCROLL ENTRANCE
═══════════════════════════════════ */
ScrollTrigger.create({
  trigger: '#works', start: 'top 72%',
  onEnter() {
    gsap.to('#w-eye', { clipPath:'inset(0 0% 0 0)', duration:.9, ease:'power3.out' });
    gsap.to('#w-ttl', { clipPath:'inset(0 0 0% 0)', duration:1,  ease:'power3.out', delay:.12 });
    gsap.to('#w-nav', { opacity:1, duration:.7, ease:'power2.out', delay:.3 });
    gsap.to('.dot-row', { opacity:1, duration:.6, ease:'power2.out', delay:.4 });

    // stagger cards in from below, then init carousel position
    gsap.fromTo('.proj-card',
      { opacity: 0, y: 50 },
      {
        opacity: 1, y: 0,
        duration: .8,
        stagger: { each: .09, from: 'start' },
        ease: 'expo.out', delay: .2,
        onComplete() {}
      }
    );
  }
});

// Initial state before entrance
gsap.set('.proj-card', { opacity: 0, y: 50 });
document.getElementById('btn-prev').disabled = true;

// Set carousel geometry immediately so it's correct before cards fade in
window.addEventListener('load', () => {
  initCarousel();
});
</script>
